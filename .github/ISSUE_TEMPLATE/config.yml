blank_issues_enabled: false

issue_templates:
  - name: "🐛 Bug Report"
    description: "Report a problem or unexpected behavior."
    title: "fix: "
    labels: ["bug"]
    template: "bug_report.md"

  - name: "✨ Feature Request"
    description: "Suggest a new idea or enhancement."
    title: "feat: "
    labels: ["enhancement"]
    template: "feature_request.md"
