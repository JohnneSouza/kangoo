version: '3.8'
services:
  postgres:
    container_name: customers_postgres
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"


  pgadmin:
    container_name: customers_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: user@pg.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"